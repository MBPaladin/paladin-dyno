behaviors:

  # A grid search actuator efficency test
  - id: EFFICIENCY
    type: grid_search
    settings:
      input_motor:
        control_mode: velocity
        command_list: [25, 50, 100] # units = Rad/s
      output_motor:
        control_mode: torque
        command_list: [-20, -40, -60, -80, -100, 20, 40, 60, 80, 100] # Small torque sweeps around zero
      loop_order: [velocity, torque]
      duration_per_point_s: 3
      settle_time_s: 0.5
      transition_rate: 0.25 #Fraction of max allowable velocity / torque ramp rate