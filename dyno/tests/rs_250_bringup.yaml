  - id: EFFICIENCY
    type: grid_search
    settings:
      input_motor:
        control_mode: velocity
        command_list: [1, 2, 3, 4] # units = Rad/s
      output_motor:
        control_mode: torque
        command_list: [0, 2.5, 5]
      loop_order: [velocity, torque]
      duration_per_point_s: 1.5
      settle_time_s: 0.25
      transition_rate: 0.05 #Fraction of max allowable velocity / torque ramp rate
